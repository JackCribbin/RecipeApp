name: Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore dependencies
      run: dotnet restore RecipeApp.Api/RecipeApp.Api.csproj
    
    - name: Build
      run: dotnet build RecipeApp.Api/RecipeApp.Api.csproj -c Release --no-restore
    
    - name: Publish
      run: dotnet publish RecipeApp.Api/RecipeApp.Api.csproj -c Release -o ./publish --no-build
    
    - name: Deploy to Azure
      uses: azure/webapps-deploy@v3
      with:
        app-name: recipeapp-api
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./publish